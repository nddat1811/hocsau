task: regression
problem_type: regression
csv: parkinsons+telemonitoring/parkinsons_updrs.data
target_col: motor_UPDRS

feature_cols: age,sex,test_time,Jitter(%),Jitter(Abs),Jitter:RAP,Jitter:PPQ5,Jitter:DDP,Shimmer,Shimmer(dB),Shimmer:APQ3,Shimmer:APQ5,Shimmer:APQ11,Shimmer:DDA,NHR,HNR,RPDE,DFA,PPE
feature_selection: mutual_info
num_features: 16

hidden_dim: 128
dropout: 0.25
batch_size: 64
epochs: 100
lr: 0.001
weight_decay: 0.0001
test_size: 0.2
seed: 42
device: auto
out_dir: runs/tele_mlp_motor
